name: Link Rot Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in manifests
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --include-fragments
            --format markdown
            'apps/**/manifest.json'
          output: /tmp/link-report.md
        continue-on-error: true

      - name: Create/update tracking issue
        if: steps.lychee.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('/tmp/link-report.md', 'utf8')
            const title = '🔗 Broken links detected in app manifests'
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'link-rot',
            })
            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `Weekly link check — ${new Date().toISOString().split('T')[0]}\n\n${body}`,
              })
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Weekly link check — ${new Date().toISOString().split('T')[0]}\n\n${body}`,
                labels: ['link-rot'],
              })
            }
