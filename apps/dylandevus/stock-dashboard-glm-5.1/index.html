const START_DATE = new Date('2025-06-13');

function generateDates(count) {
  const dates = [];
  let d = new Date(START_DATE);
  d.setDate(d.getDate() - (count - 1) * 7 / 5);
  for (let i = 0; i < count; i++) {
    const tradeDate = new Date(START_DATE);
    tradeDate.setDate(START_DATE.getDate() - (count - 1 - i));
    while (tradeDate.getDay() === 0 || tradeDate.getDay() === 6) {
      tradeDate.setDate(tradeDate.getDate() - 1);
    }
    dates.push(tradeDate.toISOString().split('T')[0]);
  }
  return dates;
}

function calcSMA(data, period) {
  const result = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) { result.push(null); continue; }
    let sum = 0;
    for (let j = 0; j < period; j++) sum += data[i - j];
    result.push(+(sum / period).toFixed(2));
  }
  return result;
}

function calcBollingerBands(data, period = 20, stdDev = 2) {
  const upper = [], middle = [], lower = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) { upper.push(null); middle.push(null); lower.push(null); continue; }
    let sum = 0;
    for (let j = 0; j < period; j++) sum += data[i - j];
    const mean = sum / period;
    let sqSum = 0;
    for (let j = 0; j < period; j++) sqSum += (data[i - j] - mean) ** 2;
    const std = Math.sqrt(sqSum / period);
    upper.push(+(mean + stdDev * std).toFixed(2));
    middle.push(+mean.toFixed(2));
    lower.push(+(mean - stdDev * std).toFixed(2));
  }
  return { upper, middle, lower };
}

function calcRSI(data, period = 14) {
  const result = [];
  let gains = 0, losses = 0;
  for (let i = 0; i < data.length; i++) {
    if (i === 0) { result.push(null); continue; }
    const change = data[i] - data[i - 1];
    if (i <= period) {
      if (change > 0) gains += change; else losses -= change;
      if (i === period) {
        const avgGain = gains / period;
        const avgLoss = losses / period;
        const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
        result.push(+(100 - 100 / (1 + rs)).toFixed(1));
      } else { result.push(null); }
    } else {
      const prevGain = change > 0 ? change : 0;
      const prevLoss = change < 0 ? -change : 0;
      gains = (gains * (period - 1) + prevGain) / period;
      losses = (losses * (period - 1) + prevLoss) / period;
      const rs = losses === 0 ? 100 : gains / losses;
      result.push(+(100 - 100 / (1 + rs)).toFixed(1));
    }
  }
  return result;
}

function formatNum(n, decimals = 2) {
  if (n == null) return '—';
  return n.toFixed(decimals);
}

function pctChange(current, previous) {
  if (!previous) return null;
  return ((current - previous) / previous * 100).toFixed(2);
}

function getStats(name, data) {
  const latest = data[data.length - 1];
  const prev = data[data.length - 2];
  const weekAgo = data[Math.max(0, data.length - 6)];
  const monthAgo = data[Math.max(0, data.length - 22)];
  const sma20 = calcSMA(data, 20);
  const sma100 = calcSMA(data, 100);
  const sma200 = calcSMA(data, 200);
  const bb = calcBollingerBands(data, 20, 2);
  const rsi = calcRSI(data, 14);
  const dailyReturns = data.slice(1).map((v, i) => (v - data[i]) / data[i]);
  const volatility = Math.sqrt(dailyReturns.reduce((s, r) => s + r * r, 0) / dailyReturns.length) * Math.sqrt(252) * 100;
  const max52 = Math.max(...data);
  const min52 = Math.min(...data);
  const ytdStart = data[0];
  const rsiLatest = rsi.filter(v => v != null).pop();
  const sma20Latest = sma20.filter(v => v != null).pop();
  const sma100Latest = sma100.filter(v => v != null).pop();
  const sma200Latest = sma200.filter(v => v != null).pop();
  const bbLatestUpper = bb.upper.filter(v => v != null).pop();
  const bbLatestLower = bb.lower.filter(v => v != null).pop();
  const trend = latest > sma200Latest ? 'Bullish' : latest < sma200Latest ? 'Bearish' : 'Neutral';
  const bbWidth = bbLatestUpper && bbLatestLower ? ((bbLatestUpper - bbLatestLower) / sma20Latest * 100).toFixed(1) : '—';

  return {
    name, latest, prev, weekAgo, monthAgo, ytdStart, max52, min52,
    change: (latest - prev).toFixed(2),
    changePct: pctChange(latest, prev),
    weekChangePct: pctChange(latest, weekAgo),
    monthChangePct: pctChange(latest, monthAgo),
    ytdChangePct: pctChange(latest, ytdStart),
    sma20Latest, sma100Latest, sma200Latest,
    sma20: sma20.filter(v => v != null).length > 0,
    sma100: sma100.filter(v => v != null).length > 0,
    sma200: sma200.filter(v => v != null).length > 0,
    bbLatestUpper, bbLatestLower, bbWidth,
    trend, rsiLatest, volatility,
    aboveSMA20: latest > sma20Latest,
    aboveSMA100: latest > sma100Latest,
    aboveSMA200: latest > sma200Latest,
  };
}

function buildChartData(data, name) {
  const dates = generateDates(data.length);
  const sma20 = calcSMA(data, 20);
  const sma100 = calcSMA(data, 100);
  const sma200 = calcSMA(data, 200);
  const bb = calcBollingerBands(data, 20, 2);
  const rsi = calcRSI(data, 14);

  return { dates, price: data, sma20, sma100, sma200, bb, rsi };
}
