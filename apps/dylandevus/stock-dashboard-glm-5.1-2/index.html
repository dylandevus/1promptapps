function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function generateHistoricalData(symbol) {
  const info = MARKET_DATA[symbol];
  const currentPrice = info.price;
  const oneYrAgo = Math.round(currentPrice / (1 + info.oneYrReturn / 100) * 100) / 100;
  const twoYrAgo = Math.round(currentPrice / (1 + info.threeYrReturn / 100) * 100) / 100;
  const low52 = parseFloat(info.wk52Range.split(' - ')[0]);
  const high52 = parseFloat(info.wk52Range.split(' - ')[1]);

  const rng = seededRandom(symbol === 'QQQ' ? 42 : symbol === 'SPY' ? 137 : 256);
  const days = 504;
  const data = [];
  const dates = [];

  const end = new Date(2026, 5, 12);
  const start = new Date(end);
  start.setDate(start.getDate() - Math.round(days * 365/252));

  const startPrice = twoYrAgo;
  const drift = Math.log(currentPrice / startPrice) / days;
  let price = startPrice;
  let day = new Date(start);

  for (let i = 0; i < days; i++) {
    while (day.getDay() === 0 || day.getDay() === 6) day.setDate(day.getDate() + 1);
    const d = new Date(day);
    const vol = symbol === 'SCHD' ? 0.012 : symbol === 'SPY' ? 0.010 : 0.014;
    const shock = vol * (rng() - 0.5 + (rng() - 0.5) + (rng() - 0.5)) * 1.2;
    const trend = drift + shock;
    price = price * Math.exp(trend);
    data.push(Math.round(price * 100) / 100);
    dates.push(d.toISOString().split('T')[0]);
    day.setDate(day.getDate() + 1);
  }

  const scale = currentPrice / data[data.length - 1];
  for (let i = 0; i < data.length; i++) {
    data[i] = Math.round(data[i] * scale * 100) / 100;
  }

  data[data.length - 1] = currentPrice;

  const midLow = Math.round(days * 0.35);
  for (let i = Math.round(days*0.2); i < Math.round(days*0.45); i++) {
    const factor = 1 - 0.12 * Math.sin(Math.PI * (i - days*0.2) / (days*0.25));
    data[i] = Math.round(data[i] * factor * 100) / 100;
  }
  for (let i = Math.round(days*0.55); i < Math.round(days*0.7); i++) {
    const factor = 1 - 0.08 * Math.sin(Math.PI * (i - days*0.55) / (days*0.15));
    data[i] = Math.round(data[i] * factor * 100) / 100;
  }

  data[data.length - 1] = currentPrice;

  return { prices: data, dates };
}

function calcSMA(data, period) {
  const result = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) { result.push(null); continue; }
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += data[j];
    result.push(Math.round(sum / period * 100) / 100);
  }
  return result;
}

function calcBollingerBands(data, period = 20, mult = 2) {
  const sma = calcSMA(data, period);
  const upper = [], lower = [];
  for (let i = 0; i < data.length; i++) {
    if (sma[i] === null) { upper.push(null); lower.push(null); continue; }
    let sqSum = 0;
    for (let j = i - period + 1; j <= i; j++) sqSum += (data[j] - sma[i]) ** 2;
    const stdDev = Math.sqrt(sqSum / period);
    upper.push(Math.round((sma[i] + mult * stdDev) * 100) / 100);
    lower.push(Math.round((sma[i] - mult * stdDev) * 100) / 100);
  }
  return { upper, middle: sma, lower };
}

function calcRSI(data, period = 14) {
  const result = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period) { result.push(null); continue; }
    let gains = 0, losses = 0;
    for (let j = i - period + 1; j <= i; j++) {
      const diff = data[j] - data[j-1];
      if (diff > 0) gains += diff; else losses -= diff;
    }
    const rs = losses === 0 ? 100 : gains / losses;
    result.push(Math.round(100 - 100/(1+rs) * 100) / 100);
  }
  return result;
}

const allHistorical = {};
const allIndicators = {};

['QQQ', 'SPY', 'SCHD'].forEach(sym => {
  const hist = generateHistoricalData(sym);
  allHistorical[sym] = hist;
  const bb = calcBollingerBands(hist.prices);
  const sma100 = calcSMA(hist.prices, 100);
  const sma200 = calcSMA(hist.prices, 200);
  const rsi = calcRSI(hist.prices);
  const prices = hist.prices;
  const lastPrice = prices[prices.length - 1];
  const sma100Last = sma200.filter(v => v !== null).slice(-1)[0];
  const sma200Last = sma200.filter(v => v !== null).slice(-1)[0];
  allIndicators[sym] = { bb, sma100, sma200, rsi, lastPrice, sma100Last, sma200Last };
});

function createChart(symbol) {
  const canvas = document.getElementById(`chart-${symbol}`);
  if (!canvas) return;
  if (charts[symbol]) { charts[symbol].destroy(); }

  const hist = allHistorical[symbol];
  const ind = allIndicators[symbol];
  const dates = hist.dates;
  const labelEvery = Math.ceil(dates.length / 12);
  const labels = dates.map((d, i) => i % labelEvery === 0 ? d.slice(0,7) : '');

  const datasets = [
    {
      label: 'Price',
      data: hist.prices,
      borderColor: '#2563eb',
      backgroundColor: 'rgba(37,99,235,0.05)',
      borderWidth: 2,
      pointRadius: 0,
      fill: true,
      order: 5,
      tension: 0.1,
    },
    {
      label: 'BB Upper',
      data: ind.bb.upper,
      borderColor: 'rgba(239,68,68,0.45)',
      borderWidth: 1.2,
      borderDash: [4,3],

    },

      borderWidth: 1.2,
      borderDash: [4,3],

    },
    {
      label: '100-Day SMA',
      data: ind.sma100,

      borderWidth: 1.5,
      pointRadius: 0,
      fill: false,

          display: true,
          position: 'top',
          labels: { usePointStyle: true, pointStyle:'circle', boxWidth:8, padding:12, font:{size:11} }
        },
        tooltip: {
          backgroundColor: 'rgba(255,255,255,0.97)',
          titleColor: '#1e293b',
          bodyColor: '#475569',
          borderColor: '#e2e8f0',
          borderWidth: 1,
          padding: 10,
          displayColors: true,
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y !== null ? ctx.parsed.y.toFixed(2) : 'N/A'}`
          }
        }
      },
      scales: {
        x: {
          ticks: {
            maxTicksLimit: 10,
            callback: function(val, idx) {
              const d = dates[idx];
              if (!d) return '';
              const dt = new Date(d);
              return dt.toLocaleDateString('en-US', { month:'short', year:'2-digit' });
            }
          },
          grid: { display: false }
        },
        y: {
          position: 'right',
          ticks: { callback: v => v.toFixed(symbol === 'SCHD' ? 2 : 0) },
          grid: { color: 'rgba(0,0,0,0.04)' }
        }
      }
    }
  });
}

function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  return n.toLocaleString();
}
