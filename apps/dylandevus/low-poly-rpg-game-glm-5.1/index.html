<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Low Poly RPG - Village Quest</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#87CEEB;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
#game{display:block;width:100vw;height:100vh;cursor:crosshair}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
.bars{position:absolute;top:12px;left:12px}
.bar-row{display:flex;align-items:center;margin-bottom:4px;gap:6px}
.bar-label{color:#fff;font-size:11px;font-weight:700;width:26px;text-shadow:1px 1px 2px rgba(0,0,0,.8)}
.bar-outer{width:140px;height:14px;background:rgba(0,0,0,.5);border-radius:7px;border:1px solid rgba(255,255,255,.3);overflow:hidden}
.bar-inner{height:100%;border-radius:6px;transition:width .3s}
.hp-bar{background:linear-gradient(180deg,#6feb6f,#35a044)}
.mp-bar{background:linear-gradient(180deg,#6fb5eb,#3575a0)}
.xp-bar{background:linear-gradient(180deg,#ebd56f,#a09535)}
.bar-text{color:#fff;font-size:10px;font-weight:700;text-shadow:1px 1px 1px rgba(0,0,0,.8);position:absolute;right:4px;line-height:14px}
.stats{position:absolute;top:56px;right:12px;background:rgba(0,0,0,.5);border-radius:8px;padding:6px 10px;color:#fff;font-size:11px;font-weight:700;text-shadow:1px 1px 2px rgba(0,0,0,.8);white-space:nowrap}
.inventory-btn{position:absolute;top:12px;right:12px;pointer-events:auto;background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.3);border-radius:8px;padding:6px 14px;color:#ffd700;font-size:13px;font-weight:700;cursor:pointer;text-shadow:1px 1px 2px rgba(0,0,0,.8)}
.inventory-btn:hover{background:rgba(0,0,0,.75)}
#inventory-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(20,15,10,.92);border:3px solid #8B6914;border-radius:12px;padding:16px;color:#fff;display:none;pointer-events:auto;min-width:280px;max-width:90vw}
#inventory-panel.open{display:block}
.inv-title{font-size:18px;font-weight:700;color:#ffd700;text-align:center;margin-bottom:10px;border-bottom:2px solid #8B6914;padding-bottom:8px}
.inv-gold{text-align:center;font-size:14px;color:#ffd700;margin-bottom:10px}
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.inv-slot{background:rgba(0,0,0,.4);border:1px solid #555;border-radius:6px;padding:6px;text-align:center;font-size:10px;min-height:54px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.inv-slot .icon{font-size:22px;margin-bottom:2px}
.inv-slot .count{font-size:9px;color:#aaa}
.inv-close{display:block;margin:0 auto;background:#8B6914;border:none;border-radius:6px;padding:6px 20px;color:#fff;font-weight:700;cursor:pointer;font-size:13px}
.inv-close:hover{background:#a07918}
.dialog{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(20,15,10,.9);border:3px solid #8B6914;border-radius:10px;padding:12px 16px;color:#fff;max-width:320px;text-align:center;font-size:13px;display:none;pointer-events:none}
.dialog.open{display:block}
.dialog .npc-name{color:#ffd700;font-weight:700;margin-bottom:4px}
.mobile-controls{position:absolute;bottom:10px;left:10px;right:10px;display:none;pointer-events:auto;justify-content:space-between;align-items:flex-end}
.dpad{position:relative;width:130px;height:130px}
.dpad-btn{position:absolute;width:44px;height:44px;background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.35);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.dpad-btn:active{background:rgba(255,255,255,.3)}
.dpad-up{top:0;left:43px}
.dpad-down{bottom:0;left:43px}
.dpad-left{top:43px;left:0}
.dpad-right{top:43px;right:0}
.action-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;max-width:180px}
.action-btn{width:50px;height:50px;background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;cursor:pointer;text-align:center;line-height:1.1;-webkit-tap-highlight-color:transparent}
.action-btn:active{background:rgba(255,255,255,.3)}
.action-btn.attack{border-color:rgba(255,80,80,.5)}
.action-btn.magic{border-color:rgba(80,150,255,.5)}
.action-btn.interact{border-color:rgba(80,255,80,.5)}
.minimap{position:absolute;bottom:12px;right:12px;width:120px;height:120px;border:2px solid rgba(255,255,255,.4);border-radius:8px;overflow:hidden;background:rgba(0,0,0,.4)}
.tooltip{position:absolute;background:rgba(20,15,10,.9);border:2px solid #8B6914;border-radius:6px;padding:6px 10px;color:#fff;font-size:11px;display:none;pointer-events:none;white-space:nowrap}
@media(max-width:768px){
 .bar-outer{width:100px;height:12px}
 .bar-label{font-size:10px;width:22px}
 .stats{font-size:10px;padding:6px 8px}
 .mobile-controls{display:flex}
 .minimap{width:80px;height:80px;bottom:150px}
}
@media(min-width:769px){
 .mobile-controls{display:none}
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
 <div class="bars">
  <div class="bar-row"><span class="bar-label">HP</span><div class="bar-outer"><div class="bar-inner hp-bar" id="hp-bar" style="width:100%"></div></div></div>
  <div class="bar-row"><span class="bar-label">MP</span><div class="bar-outer"><div class="bar-inner mp-bar" id="mp-bar" style="width:100%"></div></div></div>
  <div class="bar-row"><span class="bar-label">XP</span><div class="bar-outer"><div class="bar-inner xp-bar" id="xp-bar" style="width:0%"></div></div></div>
 </div>
 <div class="stats" id="stats">Lv 1 | ATK 5 | DEF 2</div>
 <button class="inventory-btn" id="inv-btn">🎒 Items</button>
 <div id="inventory-panel">
  <div class="inv-title">Inventory</div>
  <div class="inv-gold" id="inv-gold">Gold: 0</div>
  <div class="inv-grid" id="inv-grid"></div>
  <button class="inv-close" id="inv-close">Close</button>
 </div>
 <div class="dialog" id="dialog"><div class="npc-name" id="dialog-name"></div><div id="dialog-text"></div></div>
 <canvas class="minimap" id="minimap" width="120" height="120"></canvas>
 <div class="mobile-controls" id="mobile-controls">
  <div class="dpad">
   <div class="dpad-btn dpad-up" data-dir="up">↑</div>
   <div class="dpad-btn dpad-down" data-dir="down">↓</div>
   <div class="dpad-btn dpad-left" data-dir="left">←</div>
   <div class="dpad-btn dpad-right" data-dir="right">→</div>
  </div>
  <div class="action-btns">
   <div class="action-btn attack" data-action="attack">ATK</div>
   <div class="action-btn magic" data-action="magic">MAG</div>
   <div class="action-btn interact" data-action="interact">TALK</div>
   <div class="action-btn" data-action="jump">JMP</div>
  </div>
 </div>
 <div class="tooltip" id="tooltip"></div>
</div>
<script>
const T={W:64,H:32,MAP:80};
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const mmCanvas=document.getElementById('minimap');
const mmCtx=mmCanvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

function iso(x,y,z=0){return{x:(x-y)*T.W/2,y:(x+y)*T.H/2-z}}

const TILE={GRASS:0,GRASS2:1,WATER:2,PATH:3,DIRT:4,SAND:5,FLOWER:6,BRIDGE:7,DEEP:8};
const COLORS={
 [TILE.GRASS]:['#5aad4a','#4e9e40','#6cc05a'],
 [TILE.GRASS2]:['#4a9a3a','#3e8e30','#5cb04a'],
 [TILE.WATER]:['#3a8ec7','#2e7ab5','#4ea2d9'],
 [TILE.DEEP]:['#2a6ea7','#1e5e95','#3e82bb'],
 [TILE.PATH]:['#c2a66d','#b8995d','#d4b87f'],
 [TILE.DIRT]:['#a08050','#907040','#b89868'],
 [TILE.SAND]:['#d4c080','#c4b070','#e4d490'],
 [TILE.FLOWER]:['#5aad4a','#4e9e40','#6cc05a'],
 [TILE.BRIDGE]:['#9e7e4e','#8e6e3e','#b08e5e']
};

const map=[];
const buildings=[];
const trees=[];
const rocks=[];
const chests=[];
const npcs=[];
const enemies=[];
let particles=[];
let floats=[];
let projectiles=[];
const barrels=[];
const gardens=[];
let lootDrops=[];

function seededRandom(seed){let s=seed;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}
const rng=seededRandom(42);

function noise2D(x,y){return rng()}

function generateMap(){
 for(let y=0;y<T.MAP;y++){
  map[y]=[];
  for(let x=0;x<T.MAP;x++){
   let d=Math.sqrt((x-T.MAP/2)**2+(y-T.MAP/2)**2);
   if(x<2||y<2||x>=T.MAP-2||y>=T.MAP-2)map[y][x]=TILE.DEEP;
   else if(d>38)map[y][x]=rng()<.3?TILE.WATER:TILE.DEEP;
   else if(d>34)map[y][x]=rng()<.5?TILE.SAND:TILE.WATER;
   else if(d>32)map[y][x]=rng()<.6?TILE.SAND:TILE.GRASS;
   else{
    let isRiverH=(y>=20&&y<=23&&x>5&&x<60);
    let isRiverV=(x>=36&&x<=38&&y>5&&y<46);
    let isBridgeH=(y>=21&&y<=22&&x>20&&x<28);
    let isBridgeV=(x===37&&y>=12&&y<=18);
    let isPath=(y===30&&x>8&&x<58)||(x===25&&y>8&&y<55);
    if(isBridgeH||isBridgeV)map[y][x]=TILE.BRIDGE;
    else if(isRiverH||isRiverV)map[y][x]=TILE.WATER;
    else if(isPath)map[y][x]=TILE.PATH;
    else{
     let r=rng();
     if(r<.08)map[y][x]=TILE.FLOWER;
     else if(r<.2)map[y][x]=TILE.GRASS2;
     else if(r<.35&&d>20)map[y][x]=TILE.DIRT;
     else map[y][x]=TILE.GRASS;
    }
   }
  }
 }
 for(let i=0;i<8;i++){
  let ox=Math.floor(rng()*25)+10;
  let oy=Math.floor(rng()*20)+8;
  let ok=true;
  for(let dy=-1;dy<=4;dy++)for(let dx=-1;dx<=4;dx++){
   let ty=oy+dy,tx=ox+dx;
   if(ty>=0&&ty<T.MAP&&tx>=0&&tx<T.MAP){
    let t=map[ty][tx];
    if(t===TILE.WATER||t===TILE.DEEP||t===TILE.BRIDGE)ok=false;
   }
  }
  if(!ok)continue;
  let types=['house','shop','inn','barn','tower','windmill','house','house'];
  buildings.push({x:ox,y:oy,type:types[i],w:3,h:3,color:['#c84040','#4080c8','#c8a040','#80b040','#6060c0','#c06040','#d08070','#50a070'][i]});
 }
 for(let i=0;i<150;i++){
  let tx=Math.floor(rng()*65)+5;
  let ty=Math.floor(rng()*65)+5;
  if(tx<T.MAP&&ty<T.MAP&&map[ty][tx]<=TILE.GRASS2){
   let nearB=buildings.some(b=>tx>b.x-2&&tx<b.x+b.w+2&&ty>b.y-2&&ty<b.y+b.h+2);
   if(!nearB){
    let types=['pine','oak','birch','spruce'];
    trees.push({x:tx,y:ty,type:types[Math.floor(rng()*4)],size:.6+rng()*.8});
   }
  }
 }
 for(let i=0;i<50;i++){
  let rx=Math.floor(rng()*65)+5;
  let ry=Math.floor(rng()*65)+5;
  if(rx<T.MAP&&ry<T.MAP&&map[ry][rx]<=TILE.DIRT){
   rocks.push({x:rx,y:ry,size:.3+rng()*.5,color:['#888','#999','#777','#8a8a7a'][Math.floor(rng()*4)]});
  }
 }
 for(let i=0;i<10;i++){
  let cx=Math.floor(rng()*50)+10;
  let cy=Math.floor(rng()*40)+5;
  if(cx<T.MAP&&cy<T.MAP&&map[cy][cx]<=TILE.FLOWER){
   chests.push({x:cx,y:cy,opened:false,loot:generateLoot()});
}
  }
  for(let i=0;i<15;i++){
   let bx2=Math.floor(rng()*55)+8;
   let by2=Math.floor(rng()*55)+8;
   if(bx2<T.MAP&&by2<T.MAP&&map[by2][bx2]<=TILE.GRASS2){
    barrels.push({x:bx2,y:by2});
   }
  }
  for(let i=0;i<6;i++){
   let gx=Math.floor(rng()*40)+10;
   let gy=Math.floor(rng()*35)+8;
   if(gx<T.MAP&&gy<T.MAP&&map[gy][gx]<=TILE.FLOWER){
    gardens.push({x:gx,y:gy,plots:2+Math.floor(rng()*3)});
   }
  }
  let npcTypes=[
  {name:'Elder Elm',color:'#d4a020',say:'Welcome to Willowdale! Explore carefully, young adventurer.'},
  {name:'Farmer Fern',color:'#80b040',say:'The crops are growing well this season!'},
  {name:'Mia Miller',color:'#c08040',say:'Fresh bread just out of the oven!'},
  {name:'Fisherman Finn',color:'#4080c0',say:'The river trout are biting today!'},
  {name:'Guard Gareth',color:'#8080c0',say:'Beware slimes in the eastern fields!'},
  {name:'Alchemist Arya',color:'#c040a0',say:'Bring me herbs and I shall make potions.'},
  {name:'Merchant Milo',color:'#c08000',say:'I have the finest wares in all the land!'},
  {name:'Scholar Sage',color:'#6060a0',say:'Knowledge is the greatest weapon of all.'},
  {name:'Baker Bella',color:'#d08070',say:'Would you like a sweetroll?'},
  {name:'Blacksmith Brin',color:'#a05030',say:'My swords are forged with fire and heart!'}
 ];
for(let i=0;i<npcTypes.length;i++){
   let nx,ny;
   if(i===0){nx=25;ny=30}
   else{nx=Math.floor(rng()*50)+10;ny=Math.floor(rng()*40)+10}
   npcs.push({x:nx,y:ny,...npcTypes[i],dir:Math.floor(rng()*4),moveTimer:0,activity:['standing','walking','farming','sitting'][Math.floor(rng()*4)]});
  }
 let enemyTypes=[
  {name:'Green Slime',hp:15,atk:3,def:1,xp:10,gold:3,color:'#60d060',shape:'slime',minLv:1},
  {name:'Blue Slime',hp:22,atk:5,def:2,xp:15,gold:5,color:'#60a0e0',shape:'slime',minLv:1},
  {name:'Red Goblin',hp:30,atk:7,def:3,xp:25,gold:8,color:'#e06040',shape:'goblin',minLv:2},
  {name:'Skeleton',hp:40,atk:9,def:4,xp:35,gold:12,color:'#d0d0c0',shape:'skeleton',minLv:3},
  {name:'Dark Bat',hp:20,atk:6,def:2,xp:18,gold:6,color:'#7050a0',shape:'bat',minLv:2},
  {name:'Orc Brute',hp:60,atk:12,def:6,xp:50,gold:20,color:'#508030',shape:'orc',minLv:4}
 ];
for(let i=0;i<20;i++){
   let ex,ey,tries=0;
   do{
    ex=Math.floor(rng()*55)+10;
    ey=Math.floor(rng()*45)+10;
    tries++;
   }while(Math.sqrt((ex-25)**2+(ey-28)**2)<8&&tries<20);
   let et=enemyTypes[Math.floor(rng()*enemyTypes.length)];
   enemies.push({x:ex,y:ey,...et,maxHp:et.hp,moveTimer:0,attackTimer:0,dir:Math.floor(rng()*4),alive:true,flashTimer:0,aggro:false});
  }
}

function generateLoot(){
 let items=[
  {name:'Health Potion',icon:'🧪',type:'potion',val:20},
  {name:'Mana Potion',icon:'💎',type:'mana',val:15},
  {name:'Iron Sword',icon:'⚔️',type:'weapon',val:8},
  {name:'Leather Armor',icon:'🛡️',type:'armor',val:4},
  {name:'Magic Ring',icon:'💍',type:'accessory',val:2},
  {name:'Gold Pouch',icon:'💰',type:'gold',val:25}
 ];
 let count=Math.floor(rng()*2)+1;
 let loot=[];
 for(let i=0;i<count;i++)loot.push({...items[Math.floor(rng()*items.length)]});
 return loot;
}

let player={x:25,y:28,z:0,vx:0,vy:0,vz:0,hp:100,maxHp:100,mp:50,maxMp:50,xp:0,xpNext:50,level:1,atk:5,def:2,magic:8,gold:10,inventory:[{name:'Health Potion',icon:'🧪',type:'potion',val:20,count:3},{name:'Mana Potion',icon:'💎',type:'mana',val:15,count:2}],dir:2,speed:2.5,running:false,attacking:false,attackTimer:0,magicTimer:0,hurtTimer:0,jumping:false,dead:false,hpRegen:0,mpRegen:0};

let camera={x:player.x,y:player.y};
let keys={};
let mousePos={x:0,y:0};
let gameTime=0;
let dialogTimer=0;
let inventoryOpen=false;

document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' '||e.key==='k')e.preventDefault()});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
canvas.addEventListener('mousemove',e=>{mousePos.x=e.clientX;mousePos.y=e.clientY});
canvas.addEventListener('click',e=>{
 if(!player.dead){
  let dx=e.clientX-W/2;
  let dy=e.clientY-H/2-50;
  doAttack(Math.atan2(dy,dx));
 }
});

let mobileDir={up:false,down:false,left:false,right:false};
let mobileAction=null;
document.querySelectorAll('.dpad-btn').forEach(btn=>{
 btn.addEventListener('touchstart',e=>{e.preventDefault();mobileDir[btn.dataset.dir]=true});
 btn.addEventListener('touchend',e=>{e.preventDefault();mobileDir[btn.dataset.dir]=false});
 btn.addEventListener('mousedown',e=>{mobileDir[btn.dataset.dir]=true});
 btn.addEventListener('mouseup',e=>{mobileDir[btn.dataset.dir]=false});
});
document.querySelectorAll('.action-btn').forEach(btn=>{
 btn.addEventListener('touchstart',e=>{e.preventDefault();handleMobileAction(btn.dataset.action)});
 btn.addEventListener('mousedown',e=>{handleMobileAction(btn.dataset.action)});
});
document.getElementById('inv-btn').addEventListener('click',toggleInventory);
document.getElementById('inv-close').addEventListener('click',toggleInventory);

function handleMobileAction(action){
 if(player.dead)return;
 if(action==='attack')doAttack(player.dir* Math.PI/2);
 else if(action==='magic')doMagic();
 else if(action==='interact')interact();
 else if(action==='jump'){player.vz=4;player.jumping=true}
}

function toggleInventory(){inventoryOpen=!inventoryOpen;document.getElementById('inventory-panel').classList.toggle('open',inventoryOpen);updateInventoryUI()}

function updateInventoryUI(){
 let grid=document.getElementById('inv-grid');
 grid.innerHTML='';
 player.inventory.forEach(item=>{
  let slot=document.createElement('div');
  slot.className='inv-slot';
  slot.innerHTML=`<div class="icon">${item.icon}</div><div>${item.name}</div>${item.count>1?`<div class="count">x${item.count}</div>`:''}`;
  slot.style.pointerEvents='auto';
  slot.style.cursor='pointer';
  slot.onclick=()=>useItem(item);
  grid.appendChild(slot);
 });
 document.getElementById('inv-gold').textContent=`💰 Gold: ${player.gold}`;
 document.getElementById('stats').textContent=`Lv ${player.level} | ATK ${player.atk} | DEF ${player.def} | MAG ${player.magic}`;
}

function useItem(item){
 if(item.type==='potion'){
  player.hp=Math.min(player.maxHp,player.hp+item.val);
  addFloat('+'+item.val+' HP',player.x,player.y,'#6feb6f');
  removeItem(item);
 }else if(item.type==='mana'){
  player.mp=Math.min(player.maxMp,player.mp+item.val);
  addFloat('+'+item.val+' MP',player.x,player.y,'#6fb5eb');
  removeItem(item);
 }else if(item.type==='weapon'){
  player.atk=item.val;
  addFloat('Equipped '+item.name,player.x,player.y,'#ffd700');
  removeItem(item);
 }else if(item.type==='armor'){
  player.def=item.val;
  addFloat('Equipped '+item.name,player.x,player.y,'#ffd700');
  removeItem(item);
 }
 updateInventoryUI();
}

function removeItem(item){item.count--;if(item.count<=0)player.inventory=player.inventory.filter(i=>i.count>0)}

function doAttack(angle){
 if(player.attackTimer>0)return;
 player.attacking=true;
 player.attackTimer=15;
 player.dir=Math.round(angle/(Math.PI/2))%4;
 if(player.dir<0)player.dir+=4;
 let range=1.5;
 enemies.forEach(e=>{
  if(!e.alive)return;
  let dx=e.x-player.x;let dy=e.y-player.y;
  let dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<range){
   let dmg=Math.max(1,player.atk-e.def+Math.floor(rng()*4)-1);
    e.hp-=dmg;e.flashTimer=8;
   addFloat('-'+dmg,e.x,e.y,'#ff4444');
   spawnHitParticles(e.x,e.y);
   if(e.hp<=0){
    e.alive=false;
    player.xp+=e.xp;
    player.gold+=e.gold;
    addFloat('+'+e.xp+' XP',e.x,e.y-0.5,'#ffd700');
    addFloat('+'+e.gold+' gold',e.x,e.y-1,'#ffd700');
    spawnDeathParticles(e.x,e.y,e.color);
    checkLevelUp();
    if(rng()<.4){
     let lt=generateLoot()[0];
     lootDrops.push({x:e.x+.5,y:e.y+.5,item:lt,timer:600});
    }
   }
  }
 });
}

function doMagic(){
 if(player.magicTimer>0||player.mp<10)return;
 player.mp-=10;
 player.magicTimer=20;
 let px=player.x;let py=player.y;
 let dirs=[[0,-1],[1,0],[0,1],[-1,0]];
 for(let i=0;i<4;i++){
  let d=dirs[i];
  projectiles.push({x:px+d[0]*.5,y:py+d[1]*.5,dx:d[0]*3,dy:d[1]*3,timer:30,spell:true});
 }
 enemies.forEach(e=>{
  if(!e.alive)return;
  let dx=e.x-player.x;let dy=e.y-player.y;
  let dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<3){
   let dmg=player.magic+Math.floor(rng()*5)-1;
   e.hp-=dmg;e.flashTimer=8;
   addFloat('-'+dmg,e.x,e.y,'#aa44ff');
   spawnHitParticles(e.x,e.y);
   if(e.hp<=0){
    e.alive=false;
    player.xp+=e.xp;player.gold+=e.gold;
    addFloat('+'+e.xp+' XP',e.x,e.y-0.5,'#ffd700');
    spawnDeathParticles(e.x,e.y,e.color);
    checkLevelUp();
   }
  }
 });
 spawnMagicParticles(px,py);
}

function interact(){
 let closest=null;let minDist=2;
 npcs.forEach(n=>{
  let d=Math.sqrt((n.x-player.x)**2+(n.y-player.y)**2);
  if(d<minDist){minDist=d;closest=n}
 });
 chests.forEach(c=>{
  let d=Math.sqrt((c.x-player.x)**2+(c.y-player.y)**2);
  if(d<minDist){minDist=d;closest=c}
 });
 if(closest&&closest.opened!==undefined){
  if(!closest.opened){
   closest.opened=true;
   closest.loot.forEach(item=>{
    addItem(item);
    addFloat('Found: '+item.name,closest.x,closest.y-1,'#ffd700');
   });
   spawnChestParticles(closest.x,closest.y);
  }else{
   addFloat('Already opened',closest.x,closest.y-1,'#aaa');
  }
 }else if(closest){
  showDialog(closest.name,closest.say+(['',' Adventurer!',' Be safe!',' Hmm...',''])[Math.floor(rng()*5)]);
 }
}

function addItem(item){
 let existing=player.inventory.find(i=>i.name===item.name&&i.type===item.type);
 if(existing)existing.count++;
 else player.inventory.push({...item,count:1});
 updateInventoryUI();
}

function showDialog(name,text){
 document.getElementById('dialog-name').textContent=name;
 document.getElementById('dialog-text').textContent=text;
 document.getElementById('dialog').classList.add('open');
 dialogTimer=180;
}

function checkLevelUp(){
 while(player.xp>=player.xpNext){
  player.xp-=player.xpNext;
  player.level++;
  player.maxHp+=10;player.hp=player.maxHp;
  player.maxMp+=5;player.mp=player.maxMp;
  player.atk+=2;player.def+=1;player.magic+=2;
  player.xpNext=Math.floor(player.xpNext*1.5);
  addFloat('LEVEL UP! Lv'+player.level,player.x,player.y-2,'#ffd700');
  spawnLevelUpParticles(player.x,player.y);
  updateInventoryUI();
 }
}

function addFloat(text,x,y,color){floats.push({text,x,y,color,timer:60,oy:0})}

function spawnHitParticles(x,y){for(let i=0;i<5;i++)particles.push({x,y:y-.3,vx:(rng()-.5)*2,vy:(rng()-.5)*2,vz:rng()*3,life:20,color:'#ff6644',size:2})}
function spawnDeathParticles(x,y,c){for(let i=0;i<15;i++)particles.push({x,y:y-.5,vx:(rng()-.5)*4,vy:(rng()-.5)*4,vz:rng()*5,life:40,color:c,size:3})}
function spawnMagicParticles(x,y){for(let i=0;i<12;i++){let a=Math.PI*2/12*i;particles.push({x,y:y-.5,vx:Math.cos(a)*2,vy:Math.sin(a)*2,vz:rng()*3,life:25,color:['#aa44ff','#6688ff','#44ddff'][Math.floor(rng()*3)],size:3})}}
function spawnLevelUpParticles(x,y){for(let i=0;i<20;i++)particles.push({x,y:y-1,vx:(rng()-.5)*3,vy:(rng()-.5)*3,vz:rng()*6,life:50,color:'#ffd700',size:3})}
function spawnChestParticles(x,y){for(let i=0;i<10;i++)particles.push({x,y:y-.5,vx:(rng()-.5)*3,vy:(rng()-.5)*3,vz:rng()*4,life:35,color:'#ffd700',size:2})}
function spawnGoldParticle(x,y){particles.push({x,y:y-.3,vx:(rng()-.5)*2,vy:-rng()*2,vz:rng()*2,life:25,color:'#ffd700',size:2})}

function update(dt){
 gameTime+=dt;
 if(player.dead)return;
 let moveX=0,moveY=0;
 if(keys['w']||keys['arrowup']||mobileDir.up)moveY=-1;
 if(keys['s']||keys['arrowdown']||mobileDir.down)moveY=1;
 if(keys['a']||keys['arrowleft']||mobileDir.left)moveX=-1;
 if(keys['d']||keys['arrowright']||mobileDir.right)moveX=1;
 player.running=keys['shift'];
 let spd=player.speed*(player.running?1.6:1);
 if(moveX||moveY){
  let len=Math.sqrt(moveX*moveX+moveY*moveY);
  moveX/=len;moveY/=len;
  player.x+=moveX*spd*dt;player.y+=moveY*spd*dt;
  if(Math.abs(moveX)>Math.abs(moveY))player.dir=moveX>0?1:3;
  else player.dir=moveY>0?2:0;
  let cx=Math.round(player.x);let cy=Math.round(player.y);
  if(cx>=0&&cy>=0&&cx<T.MAP&&cy<T.MAP){
   let t=map[cy][cx];
   if(t===TILE.WATER||t===TILE.DEEP){player.x-=moveX*spd*dt;player.y-=moveY*spd*dt}
   else if(t===TILE.SAND){player.x-=moveX*spd*dt*.4;player.y-=moveY*spd*dt*.4}
  }
 }
 player.x=Math.max(1,Math.min(T.MAP-2,player.x));
 player.y=Math.max(1,Math.min(T.MAP-2,player.y));
buildings.forEach(b=>{
   let margin=0.6;
   if(player.x>b.x-margin&&player.x<b.x+b.w+margin-1&&player.y>b.y-margin&&player.y<b.y+b.h+margin-1){
    let dx1=player.x-(b.x-margin);
    let dx2=player.x-(b.x+b.w+margin-1);
    let dy1=player.y-(b.y-margin);
    let dy2=player.y-(b.y+b.h+margin-1);
    let minDx=Math.min(Math.abs(dx1),Math.abs(dx2));
    let minDy=Math.min(Math.abs(dy1),Math.abs(dy2));
    if(minDx<minDy){
     if(dx1<=0||dx2>=0)player.x-=moveX*spd*dt;
     else player.x=dx1<Math.abs(dx2)?b.x-margin-0.1:b.x+b.w+margin-0.9;
    }else{
     if(dy1<=0||dy2>=0)player.y-=moveY*spd*dt;
     else player.y=dy1<Math.abs(dy2)?b.y-margin-0.1:b.y+b.h+margin-0.9;
    }
   }
  });

 if(keys[' ']&&!player.jumping){player.vz=4;player.jumping=true}
 player.z+=player.vz*dt*10;
 if(player.z<=0){player.z=0;player.vz=0;player.jumping=false}
 else player.vz-=.4*dt;

 if(keys['j']){doAttack(player.dir*Math.PI/2)}
 if(keys['k']){doMagic()}
 if(keys['e']){interact();keys['e']=false}

 if(player.attackTimer>0)player.attackTimer--;
 if(player.magicTimer>0)player.magicTimer--;
 if(player.hurtTimer>0)player.hurtTimer--;
 if(dialogTimer>0){dialogTimer--;if(dialogTimer<=0)document.getElementById('dialog').classList.remove('open')}

 if(player.hpRegen<=0){if(player.hp<player.maxHp)player.hp=Math.min(player.maxHp,player.hp+.02);player.hpRegen=1}
 else player.hpRegen-=dt;
 if(player.mpRegen<=0){if(player.mp<player.maxMp)player.mp=Math.min(player.maxMp,player.mp+.03);player.mpRegen=1}else player.mpRegen-=dt;

 enemies.forEach(e=>{
  if(!e.alive)return;
  let dx=player.x-e.x;let dy=player.y-e.y;
  let dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<8)e.aggro=true;
  if(e.aggro&&dist>1){
   e.moveTimer-=dt;
   if(e.moveTimer<=0){
    e.moveTimer=.3+rng()*.3;
    let spd=.8;
    e.x+=Math.sign(dx)*spd*.3;e.y+=Math.sign(dy)*spd*.3;
    e.dir=Math.abs(dx)>Math.abs(dy)?(dx>0?1:3):(dy>0?2:0);
   }
  }else if(!e.aggro){
   e.moveTimer-=dt;
   if(e.moveTimer<=0){
    e.moveTimer=1+rng()*2;
    e.x+=(rng()-.5)*.5;e.y+=(rng()-.5)*.5;
    e.x=Math.max(2,Math.min(T.MAP-3,e.x));
    e.y=Math.max(2,Math.min(T.MAP-3,e.y));
   }
  }
if(dist<1.2&&e.attackTimer<=0){
    let dmg=Math.max(1,e.atk-player.def);
    player.hp-=dmg;player.hurtTimer=8;
    addFloat('-'+dmg,player.x,player.y,'#ff4444');
    e.attackTimer=1.5;
   if(player.hp<=0){player.dead=true;player.hp=0;showDialog('GAME OVER','You have fallen! Refresh to try again.')}
  }
  if(e.attackTimer>0)e.attackTimer-=dt;
  if(e.flashTimer>0)e.flashTimer--;
 });

 projectiles.forEach(p=>{
  p.x+=p.dx*dt;p.y+=p.dy*dt;p.timer-=dt;
  if(p.timer<=0)null;
  enemies.forEach(e=>{
   if(!e.alive)return;
   let d=Math.sqrt((e.x-p.x)**2+(e.y-p.y)**2);
   if(d<1){e.hp-=3;e.flashTimer=5;addFloat('-3',e.x,e.y,'#aa44ff');p.timer=0;if(e.hp<=0){e.alive=false;player.xp+=e.xp;player.gold+=e.gold;spawnDeathParticles(e.x,e.y,e.color);checkLevelUp()}}
  });
 });
 projectiles=projectiles.filter(p=>p.timer>0);

 floats.forEach(f=>{f.timer-=dt;f.oy+=dt*1.5});
 floats=floats.filter(f=>f.timer>0);

 particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vz-=8*dt;p.life-=1});
 particles=particles.filter(p=>p.life>0);

 lootDrops.forEach(l=>{
  l.timer-=1;
  if(l.timer<=0)null;
  let d=Math.sqrt((l.x-player.x)**2+(l.y-player.y)**2);
  if(d<1){addItem(l.item);addFloat(l.item.icon+' '+l.item.name,l.x,l.y-1,'#ffd700');l.timer=0}
 });
 lootDrops=lootDrops.filter(l=>l.timer>0);

 let tx=player.x;let ty=player.y;
 camera.x+=(tx-camera.x)*.08;camera.y+=(ty-camera.y)*.08;

 updateUI();
}



function updateUI(){
 let hpPct=Math.max(0,player.hp/player.maxHp*100);
 let mpPct=Math.max(0,player.mp/player.maxMp*100);
 let xpPct=player.xp/player.xpNext*100;
 document.getElementById('hp-bar').style.width=hpPct+'%';
 document.getElementById('mp-bar').style.width=mpPct+'%';
 document.getElementById('xp-bar').style.width=xpPct+'%';
 document.getElementById('stats').textContent=`Lv${player.level} | ATK${player.atk} DEF${player.def} MAG${player.magic} | 💰${player.gold}`;
}

function drawTile(x,y,tile,t){
 let sx=x-y;let sy=x+y;
 let px=(sx)*T.W/2;
 let py=(sy)*T.H/2;
 if(px<-T.W-100||px>W+100||py<-T.H-100||py>H+100)return;
 let cols=COLORS[tile];
 if(!cols)return;
 let wave=Math.sin(gameTime+x*.3+y*.2)*2;
 ctx.beginPath();
 ctx.moveTo(px,py-T.H/2+wave);
 ctx.lineTo(px+T.W/2,py+wave);
 ctx.lineTo(px,py+T.H/2+wave);
 ctx.lineTo(px-T.W/2,py+wave);
 ctx.closePath();
if(tile===TILE.WATER||tile===TILE.DEEP){
   ctx.fillStyle=cols[Math.floor(gameTime/2)%3];
   ctx.globalAlpha=.85;
  }else if(tile===TILE.BRIDGE){
   ctx.fillStyle=cols[0];ctx.fill();ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=.5;ctx.stroke();
   ctx.strokeStyle='#6a5a30';ctx.lineWidth=2;
   ctx.beginPath();ctx.moveTo(px-T.W/2+4,py);ctx.lineTo(px+T.W/2-4,py);ctx.stroke();
   ctx.globalAlpha=1;
   let wy=y-1;let wx=x;
   if(wy>=0&&wy<T.MAP&&wx>=0&&wx<T.MAP){
    let above=map[wy][wx];
    if(above===TILE.WATER||above===TILE.DEEP){
     drawWaterfall(x,y-0.5,t);
    }
   }
   return;
  }else if(tile===TILE.FLOWER){
  ctx.fillStyle=cols[0];ctx.fill();
  ctx.beginPath();
  let fx=px+Math.sin(gameTime+x)*3;let fy=py-2+Math.cos(gameTime+y)*3;
  ctx.arc(fx,fy-Math.sin(gameTime+x+y)*4,3,0,Math.PI*2);
  ctx.fillStyle=['#ff6688','#ffaa44','#ff44aa','#44aaff','#ffff44'][Math.floor(Math.abs(Math.sin(x*7+y*13))*5)];
  ctx.fill();ctx.globalAlpha=1;return;
 }else{
  ctx.fillStyle=cols[((x+y)%3===0)?1:((x*y)%5===0)?2:0];
 }
 ctx.fill();
 ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=.5;ctx.stroke();
 ctx.globalAlpha=1;
}

function drawTree(tree,t){
 let sx=tree.x-tree.y;let sy=tree.x+tree.y;
 let px=sx*T.W/2;
 let py=sy*T.H/2-tree.size*10;
 let s=tree.size;
 if(px<-100||px>W+100||py<-200||py>H+100)return;
 if(tree.type==='pine'||tree.type==='spruce'){
  ctx.fillStyle='#5a3a1a';ctx.fillRect(px-2*s,py+10*s,4*s,12*s);
  let sway=Math.sin(gameTime*.5+tree.x)*.03;
  ctx.save();ctx.translate(px,py);ctx.rotate(sway);
  ctx.fillStyle=tree.type==='pine'?'#2d8a2d':'#1a6a3a';
  drawTriangle(0,-20*s,14*s,16*s);
  ctx.fillStyle=tree.type==='pine'?'#3aaa3a':'#2a8a4a';
  drawTriangle(0,-28*s,10*s,14*s);
  ctx.fillStyle='#4aca4a';
  drawTriangle(0,-34*s,6*s,10*s);
  ctx.restore();
 }else{
  ctx.fillStyle='#6a4a2a';ctx.fillRect(px-3*s,py+8*s,6*s,14*s);
  let sway=Math.sin(gameTime*.5+tree.x)*.02;
  ctx.save();ctx.translate(px,py);ctx.rotate(sway);
  ctx.beginPath();ctx.arc(0,-2*s,16*s,0,Math.PI*2);
  ctx.fillStyle=tree.type==='oak'?'#3a8a2a':'#7aba5a';
  ctx.fill();
  ctx.beginPath();ctx.arc(-6*s,-6*s,10*s,0,Math.PI*2);
  ctx.fillStyle=tree.type==='oak'?'#4aa8a3a':'#8aca6a';
  ctx.fill();
  ctx.restore();
 }
}

function drawTriangle(cx,cy,w,h){
 ctx.beginPath();ctx.moveTo(cx,cy-h/2);ctx.lineTo(cx-w/2,cy+h/2);ctx.lineTo(cx+w/2,cy+h/2);ctx.closePath();ctx.fill();
}

function drawBuilding(b,t){
 let sx=b.x-b.y;let sy=b.x+b.y;
 let px=sx*T.W/2;
 let py=sy*T.H/2;
 if(px<-200||px>W+200||py<-300||py>H+100)return;
 let bw=b.w*T.W/2;let bh=b.h*T.H/2;
 let bH=b.type==='tower'?50:b.type==='windmill'?55:35;
 let wc=b.color;
 let shadow='#'+(Math.max(0,parseInt(wc.slice(1,3),16)-40)).toString(16).padStart(2,'0')+(Math.max(0,parseInt(wc.slice(3,5),16)-40)).toString(16).padStart(2,'0')+(Math.max(0,parseInt(wc.slice(5,7),16)-40)).toString(16).padStart(2,'0');
 let light='#'+Math.min(255,parseInt(wc.slice(1,3),16)+30).toString(16).padStart(2,'0')+Math.min(255,parseInt(wc.slice(3,5),16)+30).toString(16).padStart(2,'0')+Math.min(255,parseInt(wc.slice(5,7),16)+30).toString(16).padStart(2,'0');

 // left wall
 ctx.beginPath();
 ctx.moveTo(px-bw/2,py);ctx.lineTo(px-bw/2,py-bH);
 ctx.lineTo(px,py-bH-bh/2);ctx.lineTo(px,py-bh/2);
 ctx.closePath();ctx.fillStyle=shadow;ctx.fill();
 ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;ctx.stroke();

 // right wall
 ctx.beginPath();
 ctx.moveTo(px+bw/2,py);ctx.lineTo(px+bw/2,py-bH);
 ctx.lineTo(px,py-bH-bh/2);ctx.lineTo(px,py-bh/2);
 ctx.closePath();ctx.fillStyle=light;ctx.fill();
 ctx.stroke();

 // roof
 ctx.beginPath();
 ctx.moveTo(px-bw/2-4,py-bH);ctx.lineTo(px,py-bH-bh/2-18);
 ctx.lineTo(px+bw/2+4,py-bH);ctx.lineTo(px,py-bH+bh/2-6);
 ctx.closePath();ctx.fillStyle='#8B2500';ctx.fill();ctx.stroke();

 // door
 let dx=px-4,dy=py-22;
 ctx.fillStyle='#4a2a10';ctx.fillRect(dx,dy,8,22);
 ctx.fillStyle='#ffd700';ctx.fillRect(dx+5,dy+10,2,2);

 // window
 ctx.fillStyle='#ffeebb';ctx.fillRect(px+bw/4,py-bH+8,8,7);
 ctx.strokeStyle='#5a3a1a';ctx.lineWidth=1;
 ctx.strokeRect(px+bw/4,py-bH+8,8,7);
 ctx.beginPath();ctx.moveTo(px+bw/4+4,py-bH+8);ctx.lineTo(px+bw/4+4,py-bH+15);ctx.stroke();
 ctx.beginPath();ctx.moveTo(px+bw/4,py-bH+11.5);ctx.lineTo(px+bw/4+8,py-bH+11.5);ctx.stroke();

 if(b.type==='windmill'){
  let angle=gameTime*.5;
  ctx.save();ctx.translate(px,py-bH-bh/2-14);
  for(let i=0;i<4;i++){
   ctx.save();ctx.rotate(angle+i*Math.PI/2);
   ctx.fillStyle='#ddd';ctx.fillRect(-2,-18,4,18);
   ctx.restore();
   }
  ctx.restore();
 }
}

function drawRock(rock,t){
 let sx=rock.x-rock.y;let sy=rock.x+rock.y;
 let px=sx*T.W/2;
 let py=sy*T.H/2-rock.size*4;
 let s=rock.size;
 if(px<-50||px>W+50||py<-50||py>H+50)return;
 ctx.beginPath();
 ctx.moveTo(px-s*8,py+s*3);ctx.lineTo(px-s*5,py-s*5);
 ctx.lineTo(px+s*2,py-s*7);ctx.lineTo(px+s*8,py-s*2);
 ctx.lineTo(px+s*6,py+s*4);ctx.closePath();
 ctx.fillStyle=rock.color;ctx.fill();
 ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=.5;ctx.stroke();
}

function drawChest(chest,t){
 let sx=chest.x-chest.y;let sy=chest.x+chest.y;
 let px=sx*T.W/2;
 let py=sy*T.H/2;
 if(px<-50||px>W+50||py<-50||py>H+50)return;
 let bob=Math.sin(gameTime*2+chest.x)*2;
 py+=bob;
 if(chest.opened){
  ctx.fillStyle='#8B6914';ctx.fillRect(px-6,py-12,12,8);
  ctx.fillStyle='#a07918';ctx.fillRect(px-7,py-5,14,5);
  ctx.fillStyle='#5a4510';ctx.fillRect(px-6,py-16,12,5);
 }else{
  ctx.fillStyle='#DAA520';ctx.fillRect(px-6,py-14,12,8);
  ctx.fillStyle='#B8860B';ctx.fillRect(px-7,py-6,14,6);
  ctx.fillStyle='#FFD700';ctx.fillRect(px-2,py-8,4,3);
  ctx.strokeStyle='#8B6914';ctx.lineWidth=1;ctx.strokeRect(px-6,py-14,12,8);
 }
}

function drawBarrel(barrel,t){
 let sx=barrel.x-barrel.y;let sy=barrel.x+barrel.y;
 let px=sx*T.W/2;let py=sy*T.H/2;
 if(px<-50||px>W+50||py<-50||py>H+50)return;
 ctx.fillStyle='#8B5E3C';ctx.fillRect(px-4,py-14,8,14);
 ctx.fillStyle='#A0704E';ctx.fillRect(px-4,py-14,8,3);
 ctx.fillStyle='#A0704E';ctx.fillRect(px-4,py-5,8,3);
 ctx.fillStyle='#6B4226';
 ctx.beginPath();ctx.moveTo(px-4,py-2);ctx.lineTo(px+4,py-2);ctx.lineTo(px+3,py+2);ctx.lineTo(px-3,py+2);ctx.closePath();ctx.fill();
}

function drawGarden(garden,t){
 let sx=garden.x-garden.y;let sy=garden.x+garden.y;
 let px=sx*T.W/2;let py=sy*T.H/2;
 if(px<-100||px>W+100||py<-100||py>H+100)return;
 ctx.fillStyle='#6a4a2a';ctx.fillRect(px-10,py-4,20,8);
 ctx.fillStyle='#3a7a2a';
 for(let i=0;i<garden.plots;i++){
  let ox=(i-1)*7;
  let gh=3+Math.sin(gameTime+i)*1;
  ctx.fillRect(px+ox-2,py-2-gh,4,gh);
  ctx.fillStyle=['#ff6080','#ffaa40','#ff40ff'][i%3];
  ctx.beginPath();ctx.arc(px+ox,py-2-gh,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a7a2a';
 }
}

function drawWaterfall(x,y,t){
 let sx=x-y;let sy=x+y;
 let px=sx*T.W/2;let py=sy*T.H/2;
 let animY=Math.sin(gameTime*3)*2;
 ctx.fillStyle='#4ea2d9';ctx.globalAlpha=.8;
 for(let i=0;i<4;i++){
  let fy=py-i*8+animY;
  ctx.fillRect(px-6,fy,12,6);
  ctx.fillStyle=i%2?'#4ea2d9':'#6eb8e8';
 }
 ctx.globalAlpha=1;
 ctx.fillStyle='#aaddff';
 ctx.beginPath();ctx.arc(px,py+2+animY,4,0,Math.PI*2);ctx.fill();
 ctx.beginPath();ctx.arc(px-3,py+4+animY,3,0,Math.PI*2);ctx.fill();
 ctx.beginPath();ctx.arc(px+3,py+3+animY,2,0,Math.PI*2);ctx.fill();
}

function drawStoneBridge(x,y,t){
 let sx=x-y;let sy=x+y;
 let px=sx*T.W/2;let py=sy*T.H/2;
 ctx.fillStyle='#8a8070';
 ctx.fillRect(px-T.W/2+2,py-2,T.W-4,T.H+4);
 ctx.fillStyle='#9a9080';
 ctx.fillRect(px-T.W/2+4,py-3,T.W-8,4);
 ctx.strokeStyle='#6a6050';ctx.lineWidth=.5;
 ctx.strokeRect(px-T.W/2+2,py-2,T.W-4,T.H+4);
}

function drawCharacter(x,y,z,color,dir,bobOffset,hatColor,isHurt){
 let sx=x-y;let sy=x+y;
 let px=sx*T.W/2;
 let py=sy*T.H/2-z*20;
 if(isHurt&&Math.floor(gameTime*10)%2===0){ctx.globalAlpha=.5}
 let bob=Math.sin(gameTime*4+bobOffset)*2;
 py+=bob;

 // shadow
 ctx.beginPath();ctx.ellipse(px,py+18,10,4,0,0,Math.PI*2);
 ctx.fillStyle='rgba(0,0,0,.25)';ctx.fill();

 // body
 ctx.fillStyle=color;
 ctx.fillRect(px-5,py-4,10,14);

 // arms
 let armSwing=Math.sin(gameTime*6+bobOffset)*3;
 ctx.fillRect(px-8,py-2+armSwing,3,10);
 ctx.fillRect(px+5,py-2-armSwing,3,10);

 // head
 ctx.fillStyle='#ffcc99';
 ctx.beginPath();ctx.arc(px,py-10,7,0,Math.PI*2);ctx.fill();

 // hat
 ctx.fillStyle=hatColor||'#cc3333';
 ctx.beginPath();
 ctx.moveTo(px-8,py-12);ctx.lineTo(px,py-20);ctx.lineTo(px+8,py-12);
 ctx.closePath();ctx.fill();

 if(isHurt)ctx.globalAlpha=1;
}

function drawPlayer(){
 if(player.dead&&gameTime%1<.5)return;
 drawCharacter(player.x,player.y,player.z,'#4488cc',player.dir,0,'#cc3333',player.hurtTimer>0);
 if(player.attacking||player.attackTimer>8){
  let dirs=[[0,-1],[1,0],[0,1],[-1,0]];
  let d=dirs[player.dir];
  let ax=player.x+d[0]*1.2;let ay=player.y+d[1]*1.2;
  let sp=iso(ax,ay,player.z*20);
  let px=(ax-ay)*T.W/2;let py2=(ax+ay)*T.H/2-player.z*20-5;
  ctx.fillStyle='#ffcc44';ctx.globalAlpha=.7;
  ctx.beginPath();ctx.arc(px,py2,8,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
 }
}

function drawNPC(npc){
 let bobOff=npc.x+npc.y;
 drawCharacter(npc.x,npc.y,0,npc.color,npc.dir,bobOff,npc.color,false);
 // name tag
 let sx=npc.x-npc.y;let sy=npc.x+npc.y;
 let px=sx*T.W/2;let py=sy*T.H/2-32;
 ctx.fillStyle='rgba(0,0,0,.5)';
 ctx.font='9px sans-serif';
 let tw=ctx.measureText(npc.name).width;
 ctx.fillRect(px-tw/2-2,py-7,tw+4,12);
 ctx.fillStyle='#fff';ctx.textAlign='center';
 ctx.fillText(npc.name,px,py);ctx.textAlign='left';
}

function drawEnemy(e){
 if(!e.alive)return;
 let sx=e.x-e.y;let sy=e.x+e.y;
 let px=sx*T.W/2;
 let py=sy*T.H/2;
 let bob=Math.sin(gameTime*5+e.x)*3;
 py+=bob;

 if(e.flashTimer>0){ctx.globalAlpha=.6+Math.sin(gameTime*20)*.4}

 // shadow
 ctx.beginPath();ctx.ellipse(px,py+16,8,3,0,0,Math.PI*2);
 ctx.fillStyle='rgba(0,0,0,.3)';ctx.fill();

 let sz=e.shape==='orc'?1.4:e.shape==='slime'?.8:1;
 ctx.save();ctx.translate(px,py);ctx.scale(sz,sz);

 if(e.shape==='slime'){
  let squash=1+Math.sin(gameTime*3+e.x)*.1;
  ctx.save();ctx.scale(1/squash,squash);
  ctx.beginPath();ctx.ellipse(0,-4,10,8,0,0,Math.PI*2);
  ctx.fillStyle=e.color;ctx.fill();
  ctx.beginPath();ctx.ellipse(0,-6,10,8,0,Math.PI,Math.PI*2);
  ctx.fillStyle=e.color;ctx.fill();
  ctx.restore();
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(-3,-6,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3,-6,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-2.5,-6.5,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3.5,-6.5,1,0,Math.PI*2);ctx.fill();
 }else if(e.shape==='goblin'||e.shape==='orc'){
  ctx.fillStyle=e.color;ctx.fillRect(-5,-12,10,16);
  ctx.beginPath();ctx.arc(0,-16,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffcc99';ctx.beginPath();ctx.arc(0,-16,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';
  ctx.fillRect(-3,-18,3,2);ctx.fillRect(1,-18,3,2);
  ctx.fillStyle=e.shape==='orc'?'#504020':'#5a3a1a';
  ctx.fillRect(-5,-22,10,6);
  // weapon
  ctx.fillStyle='#888';ctx.fillRect(6,-10,2,12);
  ctx.fillStyle='#aaa';ctx.fillRect(4,-12,6,3);
 }else if(e.shape==='skeleton'){
  ctx.fillStyle=e.color;
  ctx.fillRect(-3,-14,6,18);
  ctx.beginPath();ctx.arc(0,-18,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.arc(-2,-19,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(2,-19,1.5,0,Math.PI*2);ctx.fill();
  ctx.fillRect(-1,-16,2,3);
 }else if(e.shape==='bat'){
  let wingFlap=Math.sin(gameTime*8+e.x)*5;
  ctx.fillStyle=e.color;
  ctx.beginPath();ctx.arc(0,-8,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(-12,-16+wingFlap);ctx.lineTo(-4,-5);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(12,-16-wingFlap);ctx.lineTo(4,-5);ctx.closePath();ctx.fill();
 }
 ctx.restore();

 // HP bar
 if(e.hp<e.maxHp){
  let bw=24;
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(px-bw/2,py-28,bw,4);
  ctx.fillStyle='#ff4444';ctx.fillRect(px-bw/2,py-28,bw*(e.hp/e.maxHp),4);
 }

 ctx.globalAlpha=1;
}

function drawProjectile(p){
 let sx=p.x-p.y;let sy=p.x+p.y;
 let px=sx*T.W/2;let py=sy*T.H/2-10;
 let a=Math.sin(gameTime*10)*3;
 ctx.beginPath();ctx.arc(px+a,py+a,4+Math.sin(gameTime*8)*2,0,Math.PI*2);
 ctx.fillStyle='rgba(170,68,255,.7)';ctx.fill();
 ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);
 ctx.fillStyle='#fff';ctx.fill();
}

function drawLootDrop(l){
 let sx=l.x-l.y;let sy=l.x+l.y;
 let px=sx*T.W/2;let py=sy*T.H/2-8+Math.sin(gameTime*3+l.x)*4;
 let alpha=l.timer<120?l.timer/120:1;
 ctx.globalAlpha=alpha;
 ctx.font='14px sans-serif';ctx.textAlign='center';
 ctx.fillText(l.item.icon,px,py);
 ctx.globalAlpha=1;ctx.textAlign='left';
}

function drawFloats(){
 floats.forEach(f=>{
  let sx=f.x-f.y;let sy=f.x+f.y;
  let px=sx*T.W/2;let py=(sy)*T.H/2-f.oy*15-20;
  let alpha=Math.min(1,f.timer/30);
  ctx.globalAlpha=alpha;
  ctx.font='bold 12px sans-serif';ctx.textAlign='center';
  ctx.fillStyle='#000';ctx.fillText(f.text,px+1,py+1);
  ctx.fillStyle=f.color;ctx.fillText(f.text,px,py);
  ctx.textAlign='left';ctx.globalAlpha=1;
 });
}

function drawParticles(){
 particles.forEach(p=>{
  let sx=p.x-p.y;let sy=p.x+p.y;
  let px=sx*T.W/2+p.vx*5;
  let py=sy*T.H/2+p.vy*5-p.z*3;
  ctx.globalAlpha=Math.min(1,p.life/15);
  ctx.fillStyle=p.color;
  ctx.fillRect(px-p.size/2,py-p.size/2,p.size,p.size);
 });
 ctx.globalAlpha=1;
}

function drawMinimap(){
 mmCtx.fillStyle='rgba(0,0,0,.4)';mmCtx.fillRect(0,0,120,120);
 let s=1.5;
 for(let y=0;y<T.MAP;y++){
  for(let x=0;x<T.MAP;x++){
   let t=map[y][x];
   if(t===TILE.WATER||t===TILE.DEEP)mmCtx.fillStyle='#3a8ec7';
   else if(t===TILE.PATH)mmCtx.fillStyle='#c2a66d';
   else if(t===TILE.SAND)mmCtx.fillStyle='#d4c080';
   else if(t===TILE.DIRT)mmCtx.fillStyle='#a08050';
   else mmCtx.fillStyle='#5aad4a';
   mmCtx.fillRect(x*s,y*s,s,s);
  }
 }
 buildings.forEach(b=>{mmCtx.fillStyle='#c0c0c0';mmCtx.fillRect(b.x*s,b.y*s,b.w*s,b.h*s)});
 npcs.forEach(n=>{mmCtx.fillStyle=n.color;mmCtx.fillRect(n.x*s,n.y*s,2,2)});
 enemies.forEach(e=>{if(e.alive){mmCtx.fillStyle='#ff3333';mmCtx.fillRect(e.x*s,e.y*s,2,2)}});
 chests.forEach(c=>{mmCtx.fillStyle=c.opened?'#888':'#ffd700';mmCtx.fillRect(c.x*s,c.y*s,2,2)});
 mmCtx.fillStyle='#ffffff';
 mmCtx.fillRect(player.x*s-1,player.y*s-1,3,3);
}

function drawAmbientLight(){
 let gradient=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.6);
 gradient.addColorStop(0,'rgba(255,250,230,.0)');
 gradient.addColorStop(.7,'rgba(255,250,230,.0)');
 gradient.addColorStop(1,'rgba(100,140,200,.15)');
 ctx.fillStyle=gradient;ctx.fillRect(0,0,W,H);

 let dayPhase=Math.sin(gameTime*.01)*.5+.5;
 ctx.fillStyle=`rgba(255,220,150,${dayPhase*.05})`;ctx.fillRect(0,0,W,H);
}

function render(){
 ctx.clearRect(0,0,W,H);

 let skyGrad=ctx.createLinearGradient(0,0,0,H);
 skyGrad.addColorStop(0,'#87CEEB');skyGrad.addColorStop(.5,'#a8d8ea');skyGrad.addColorStop(1,'#c8e8d8');
 ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,H);

 // distant hills
 ctx.fillStyle='rgba(100,160,100,.3)';
 for(let i=0;i<3;i++){
  ctx.beginPath();
  ctx.moveTo(-50,H*.55);
  for(let x=-50;x<=W+50;x+=20){
   ctx.lineTo(x,H*.55-i*8+Math.sin(x*.003+i*2)*20);
  }
  ctx.lineTo(W+50,H);ctx.lineTo(-50,H);ctx.closePath();ctx.fill();
 }

 ctx.save();
 let camSX=(camera.x-camera.y)*T.W/2;
 let camSY=(camera.x+camera.y)*T.H/2;
 ctx.translate(W/2-camSX,H/2-camSY+50);

 let viewR=Math.max(W,H)/T.W+20;
 let viewX1=camera.x-viewR;
 let viewX2=camera.x+viewR;
 let viewY1=camera.y-viewR;
 let viewY2=camera.y+viewR;

 let allObjects=[];

 for(let y=Math.max(0,Math.floor(viewY1));y<Math.min(T.MAP,Math.ceil(viewY2));y++){
  for(let x=Math.max(0,Math.floor(viewX1));x<Math.min(T.MAP,Math.ceil(viewX2));x++){
   if(x>=0&&x<T.MAP&&y>=0&&y<T.MAP){
    allObjects.push({type:'tile',x,y,tile:map[y][x],sortKey:x+y});
   }
  }
 }

 trees.forEach(t=>{
  if(t.x>viewX1-2&&t.x<viewX2+2&&t.y>viewY1-2&&t.y<viewY2+2)
   allObjects.push({type:'tree',data:t,sortKey:t.x+t.y+.1});
 });
 rocks.forEach(r=>{
  if(r.x>viewX1-2&&r.x<viewX2+2&&r.y>viewY1-2&&r.y<viewY2+2)
   allObjects.push({type:'rock',data:r,sortKey:r.x+r.y+.15});
 });
 buildings.forEach(b=>{
  allObjects.push({type:'building',data:b,sortKey:b.x+b.y+b.w/2+b.h/2-1});
 });
chests.forEach(c=>{
   allObjects.push({type:'chest',data:c,sortKey:c.x+c.y+.2});
  });
  barrels.forEach(b=>{allObjects.push({type:'barrel',data:b,sortKey:b.x+b.y+.18})});
  gardens.forEach(g=>{allObjects.push({type:'garden',data:g,sortKey:g.x+g.y+.19})});
  npcs.forEach(n=>{allObjects.push({type:'npc',data:n,sortKey:n.x+n.y+.25})});
 enemies.forEach(e=>{if(e.alive)allObjects.push({type:'enemy',data:e,sortKey:e.x+e.y+.3})});
 allObjects.push({type:'player',data:player,sortKey:player.x+player.y+.35});
 lootDrops.forEach(l=>{allObjects.push({type:'loot',data:l,sortKey:l.x+l.y+.4})});
 projectiles.forEach(p=>{allObjects.push({type:'projectile',data:p,sortKey:p.x+p.y+.45})});

 allObjects.sort((a,b)=>a.sortKey-b.sortKey);

 allObjects.forEach(obj=>{
  switch(obj.type){
   case 'tile':drawTile(obj.x,obj.y,obj.tile,gameTime);break;
   case 'tree':drawTree(obj.data,gameTime);break;
   case 'rock':drawRock(obj.data,gameTime);break;
   case 'building':drawBuilding(obj.data,gameTime);break;
   case 'chest':drawChest(obj.data,gameTime);break;
    case 'barrel':drawBarrel(obj.data,gameTime);break;
    case 'garden':drawGarden(obj.data,gameTime);break;
   case 'npc':drawNPC(obj.data);break;
   case 'enemy':drawEnemy(obj.data);break;
   case 'player':drawPlayer();break;
   case 'loot':drawLootDrop(obj.data);break;
   case 'projectile':drawProjectile(obj.data);break;
  }
 });

 drawParticles();
 drawFloats();

 ctx.restore();

 drawAmbientLight();

 if(player.dead){
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ff4444';ctx.font='bold 40px sans-serif';ctx.textAlign='center';
  ctx.fillText('GAME OVER',W/2,H/2-20);
  ctx.fillStyle='#fff';ctx.font='18px sans-serif';
  ctx.fillText('Press R to restart',W/2,H/2+20);
  ctx.textAlign='left';
  if(keys['r'])location.reload();
 }

 // draw interaction hints
 let nearInteractable=false;
 npcs.forEach(n=>{
  if(Math.sqrt((n.x-player.x)**2+(n.y-player.y)**2)<2)nearInteractable=true;
 });
 chests.forEach(c=>{
  if(!c.opened&&Math.sqrt((c.x-player.x)**2+(c.y-player.y)**2)<2)nearInteractable=true;
 });
 if(nearInteractable){
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.font='14px sans-serif';ctx.textAlign='center';
  ctx.fillText('Press E to interact',W/2,H-60);
  ctx.textAlign='left';
 }

 drawMinimap();

 // controls hint for desktop
 if(W>=769){
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.font='11px sans-serif';ctx.textAlign='right';
  ctx.fillText('WASD:Move | Space:Jump | J:Attack | K:Magic | E:Interact | I:Inventory',W-10,H-10);
  ctx.textAlign='left';
 }
}

document.addEventListener('keydown',e=>{
 if(e.key==='i'||e.key==='I')toggleInventory();
 if(e.key==='e'||e.key==='E'){keys['e']=true}
});

generateMap();

(function(){
 player.x=25;player.y=28;
 for(let tries=0;tries<100;tries++){
  let tx=Math.round(player.x);let ty=Math.round(player.y);
  if(tx>=0&&tx<T.MAP&&ty>=0&&ty<T.MAP){
   let t=map[ty][tx];
   if(t!==TILE.WATER&&t!==TILE.DEEP&&t!==TILE.BRIDGE)break;
  }
  player.x+=1;
 }
 camera.x=player.x;camera.y=player.y;
})();

let lastTime=0;
function gameLoop(time){
 let dt=Math.min((time-lastTime)/1000,.05);
 if(lastTime===0)dt=1/60;
 lastTime=time;
 update(dt);
 render();
 requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
